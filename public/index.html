<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SPY-E | MAPS INTEL DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; }
        .neo-border { border: 4px solid #00ff41; box-shadow: 8px 8px 0px #5500ff; }
        #map { height: 400px; width: 100%; border: 4px solid #5500ff; margin-bottom: 20px; }
        .terminal { background: #0a0a0a; height: 150px; overflow-y: auto; font-size: 10px; border: 2px solid #333; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-6 border-b-4 border-[#00ff41] pb-2">
            <h1 class="text-4xl font-black italic uppercase">CCTV-MAPS v3.0</h1>
            <p class="text-xs">[ STATION: X280 // IP_ANONYMOUS: ACTIVE ]</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Sidebar Control -->
            <div class="space-y-4">
                <div class="neo-border p-4 bg-[#111]">
                    <label class="block text-xs mb-2">TARGET CITY</label>
                    <input type="text" id="cityInput" placeholder="Contoh: Jakarta" class="w-full bg-black border-2 border-[#00ff41] p-2 mb-4 text-white">
                    
                    <label class="block text-xs mb-2">VENDOR FILTER</label>
                    <select id="deviceInput" class="w-full bg-black border-2 border-[#00ff41] p-2 mb-4 text-white">
                        <option value="">ALL VENDORS</option>
                        <option value="Hikvision">HIKVISION</option>
                        <option value="Dahua">DAHUA</option>
                    </select>
                    
                    <button onclick="runIntel()" class="w-full bg-[#00ff41] text-black font-black py-3 hover:bg-white transition">EXECUTE HARVEST</button>
                </div>
                
                <div class="terminal p-2" id="terminalLog">
                    <p class="text-blue-400">>> READY FOR DEPLOYMENT...</p>
                </div>
            </div>

            <!-- Map & Results -->
            <div class="lg:col-span-2">
                <div id="map"></div> <!-- Google Maps Container -->
                <div id="results" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <!-- Script Google Maps akan di-load secara dinamis -->
    <script src="script.js"></script>
</body>
</html>
